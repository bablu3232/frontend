<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrugSearch — Medical Report Analyzer</title>
    <meta name="description" content="Upload and analyze medical lab reports, search drug information, and track your health parameters.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root"></div>

    <!-- React + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Core -->
    <script type="text/babel" src="js/api.js"></script>
    <script type="text/babel" src="js/AuthContext.js"></script>
    <script type="text/babel" src="js/components/Navbar.js"></script>
    <script type="text/babel" src="js/components/Common.js"></script>

    <!-- Pages -->
    <script type="text/babel" src="js/pages/LoginPage.js"></script>
    <script type="text/babel" src="js/pages/RegisterPage.js"></script>
    <script type="text/babel" src="js/pages/ForgotPasswordPage.js"></script>
    <script type="text/babel" src="js/pages/DashboardPage.js"></script>
    <script type="text/babel" src="js/pages/UploadReportPage.js"></script>
    <script type="text/babel" src="js/pages/ReviewValuesPage.js"></script>
    <script type="text/babel" src="js/pages/ReportAnalysisPage.js"></script>
    <script type="text/babel" src="js/pages/ReportHistoryPage.js"></script>
    <script type="text/babel" src="js/pages/ReportDetailPage.js"></script>
    <script type="text/babel" src="js/pages/ManualEntryPage.js"></script>
    <script type="text/babel" src="js/pages/DrugSearchPage.js"></script>
    <script type="text/babel" src="js/pages/DrugDetailPage.js"></script>
    <script type="text/babel" src="js/pages/ProfilePage.js"></script>
    <script type="text/babel" src="js/pages/ChangePasswordPage.js"></script>
    <script type="text/babel" src="js/pages/AdminLoginPage.js"></script>
    <script type="text/babel" src="js/pages/AdminDashboardPage.js"></script>
    <script type="text/babel" src="js/pages/AboutPage.js"></script>

    <!-- App Entry -->
    <script type="text/babel" src="js/App.js"></script>
</body>
</html>
